<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preparation Planner 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--surface3:#1e2330;
  --border:#ffffff0f;--border2:#ffffff18;--border3:#ffffff24;
  --text:#dde3f0;--muted:#6b7899;--faint:#3a4255;
  --g:#10d9a0;--gd:#10d9a012;--gm:#10d9a030;
  --b:#4d9fff;--bd:#4d9fff12;--bm:#4d9fff30;
  --a:#ffb84d;--ad:#ffb84d12;--am:#ffb84d30;
  --r:#ff6b6b;--rd:#ff6b6b12;--rm:#ff6b6b30;
  --p:#b57bff;--pd:#b57bff12;--pm:#b57bff30;
  --radius:10px;--radius-sm:7px;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:999;height:52px;background:rgba(10,12,16,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px}
#nav-brand{font-weight:800;font-size:16px;color:var(--g);letter-spacing:-0.5px;white-space:nowrap;flex-shrink:0}
#nav-tabs{display:flex;gap:2px;overflow-x:auto;flex:1;margin:0 8px}
#nav-tabs::-webkit-scrollbar{display:none}
.ntab{padding:5px 13px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .15s;flex-shrink:0}
.ntab:hover{color:var(--text);background:var(--surface2)}
.ntab.on{color:var(--g);background:var(--gd);border-color:var(--gm)}
#nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
#countdown{background:var(--surface2);border:1px solid var(--am);color:var(--a);font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;font-family:var(--mono)}
/* Hamburger button — hidden on desktop */
#hamburger{display:none;flex-direction:column;justify-content:center;align-items:center;gap:5px;width:36px;height:36px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;cursor:pointer;flex-shrink:0;padding:0}
#hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .25s}
#hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
#hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* Mobile menu drawer */
#mobile-menu{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;z-index:998;background:rgba(10,12,16,.98);backdrop-filter:blur(20px);padding:16px;overflow-y:auto;flex-direction:column;gap:4px}
#mobile-menu.open{display:flex}
.mmtab{padding:13px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);text-align:left;transition:all .15s;width:100%}
.mmtab:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.mmtab.on{color:var(--g);background:var(--gd);border-color:var(--gm);font-weight:600}
/* Responsive breakpoint */
@media(max-width:700px){
  #nav-tabs{display:none}
  #hamburger{display:flex}
  #countdown{font-size:11px;padding:3px 9px}
}

/* MAIN */
#main{padding:68px 20px 40px;max-width:1200px;margin:0 auto}
.page{display:none}
.page.on{display:block;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HEADINGS */
.pg-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.pg-sub{color:var(--muted);font-size:13px;margin-bottom:24px;font-weight:300}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.g::after{background:var(--g)}.sc.b::after{background:var(--b)}.sc.a::after{background:var(--a)}.sc.r::after{background:var(--r)}.sc.p::after{background:var(--p)}
.sc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.sc-val{font-size:28px;font-weight:800;line-height:1;font-family:var(--mono)}
.sc.g .sc-val{color:var(--g)}.sc.b .sc-val{color:var(--b)}.sc.a .sc-val{color:var(--a)}.sc.r .sc-val{color:var(--r)}.sc.p .sc-val{color:var(--p)}
.sc-hint{font-size:11px;color:var(--faint);margin-top:5px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

/* TODAY HERO */
.today-hero{background:var(--surface);border:1px solid var(--gm);border-radius:var(--radius);padding:22px;margin-bottom:16px;position:relative;overflow:hidden}
.today-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(16,217,160,.07) 0%,transparent 65%);pointer-events:none}
.today-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gd);border:1px solid var(--gm);color:var(--g);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.today-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pill{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:3px 11px;font-size:12px;color:var(--muted)}
.pill span{color:var(--text);font-weight:500}
.task-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.task-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px}
.task-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:5px}
.task-txt{font-size:13px;line-height:1.5}
@media(max-width:550px){.task-grid{grid-template-columns:1fr}}

/* PROGRESS BAR */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.prog-lbl{font-size:12px;min-width:175px;font-weight:500}
.prog-track{flex:1;background:var(--surface2);border-radius:4px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:var(--g);transition:width .5s ease}
.prog-pct{font-size:11px;color:var(--muted);min-width:32px;text-align:right;font-family:var(--mono)}

/* PLAN PAGE */
.search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-in{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.search-in:focus{border-color:var(--gm)}
.search-in::placeholder{color:var(--faint)}
.ftabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.ftab{padding:6px 15px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.ftab:hover{border-color:var(--border2);color:var(--text)}
.ftab.fg.on{background:var(--gd);border-color:var(--gm);color:var(--g)}
.ftab.fb.on{background:var(--bd);border-color:var(--bm);color:var(--b)}
.ftab.fa.on{background:var(--ad);border-color:var(--am);color:var(--a)}
.ftab.fall.on{background:var(--pd);border-color:var(--pm);color:var(--p)}

/* DAY ROWS */
.day-row{display:grid;grid-template-columns:46px 90px 46px 100px 1fr 36px;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative}
.day-row:hover{border-color:var(--border2);background:var(--surface2)}
.day-row.is-today{border-color:var(--gm)!important;background:rgba(16,217,160,.03)!important}
.day-row.is-done{opacity:.45}
.day-row.p1{border-left:2px solid var(--g)}
.day-row.p2{border-left:2px solid var(--b)}
.day-row.p3{border-left:2px solid var(--a)}
.dnum{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:500}
.ddate{font-size:12px;color:var(--muted)}
.dday{font-size:11px;color:var(--faint)}
.dtopic{font-size:13px;font-weight:500}
.dsubj{font-size:11px;color:var(--muted);margin-top:2px}
.done-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px;transition:all .15s;font-family:var(--font);flex-shrink:0}
.done-btn:hover{border-color:var(--g);color:var(--g)}
.done-btn.done{background:var(--g);border-color:var(--g);color:#0a0c10;font-weight:700}
.detail-panel{display:none;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:12px 14px;margin-top:-4px;margin-bottom:6px;grid-template-columns:1fr 1fr;gap:10px}
.detail-panel.open{display:grid}
.dp-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.dp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:4px}
.dp-val{font-size:12px;line-height:1.5}
.dp-link{color:var(--b);text-decoration:none;font-size:12px}
.dp-link:hover{text-decoration:underline}
@media(max-width:640px){.day-row{grid-template-columns:1fr 36px}.ddate,.dday,.dnum{display:none}.detail-panel{grid-template-columns:1fr}}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bs{background:var(--bd);color:var(--b);border:1px solid var(--bm)}
.bm{background:var(--rd);color:var(--r);border:1px solid var(--rm)}
.br{background:rgba(58,66,85,.4);color:var(--faint);border:1px solid var(--border)}
.bv{background:var(--pd);color:var(--p);border:1px solid var(--pm)}
.be{background:var(--gd);color:var(--g);border:1px solid var(--gm)}

/* WEEK CARDS */
.wk-cards{display:grid;gap:10px}
.wk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:grid;grid-template-columns:90px 1fr;gap:16px;transition:border-color .15s}
.wk-card:hover{border-color:var(--border2)}
.wk-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;border-radius:5px;text-align:center}
.wk-phase.p1{background:var(--gd);color:var(--g);border:1px solid var(--gm)}
.wk-phase.p2{background:var(--bd);color:var(--b);border:1px solid var(--bm)}
.wk-phase.p3{background:var(--ad);color:var(--a);border:1px solid var(--am)}
.wk-dates{font-size:11px;color:var(--muted);margin-top:4px}
.wk-topic{font-weight:700;font-size:14px;margin-bottom:4px}
.wk-detail{font-size:12px;color:var(--muted);line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--faint)}

/* SYLLABUS */
.syl-sec{margin-bottom:24px}
.syl-hdr{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.syl-table{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.syl-row{display:grid;grid-template-columns:190px 1fr 90px 90px 95px;gap:0;border-bottom:1px solid var(--border)}
.syl-row:last-child{border-bottom:none}
.syl-row.hdr{background:var(--surface2)}
.syl-cell{padding:9px 12px;font-size:12px}
.syl-row.hdr .syl-cell{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.syl-topic{font-weight:500}
.syl-note{font-size:10px;color:var(--g);margin-top:2px}
.hi{color:var(--r);font-weight:600}.md{color:var(--a);font-weight:600}.lo{color:var(--muted)}
@media(max-width:700px){.syl-row{grid-template-columns:1fr 1fr}.syl-cell:nth-child(3),.syl-cell:nth-child(4){display:none}}

/* RESOURCES */
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;transition:all .15s}
.res-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.res-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.res-name{font-size:15px;font-weight:700;margin-bottom:4px}
.res-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.res-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;text-decoration:none;padding:5px 12px;border-radius:6px;background:var(--bd);color:var(--b);border:1px solid var(--bm);transition:all .15s}
.res-btn:hover{background:var(--bm)}

/* TRACKER TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);margin-top:16px}
table{width:100%;border-collapse:collapse;white-space:nowrap}
th{background:var(--surface2);padding:9px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:7px 11px;border-bottom:1px solid var(--border);font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.ti{background:transparent;border:none;color:var(--text);font-size:12px;font-family:var(--font);outline:none;width:100%;min-width:30px;text-align:center}
.ti:focus{background:var(--surface2);border-radius:4px}
.tr-p1{border-left:2px solid var(--g)}.tr-p2{border-left:2px solid var(--b)}.tr-p3{border-left:2px solid var(--a)}

/* MILESTONE GRID */
.ms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.ms-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.ms-name{font-size:13px;font-weight:600;margin-bottom:3px}
.ms-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.ms-days{font-size:14px;font-weight:700}

/* MISC */
.save-toast{position:fixed;bottom:20px;right:20px;background:var(--g);color:#0a0c10;padding:9px 18px;border-radius:8px;font-weight:700;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}
a{color:var(--b)}
</style>
</head>

const now = new Date(); now.setHours(0,0,0,0);
function todayISO() { return now.toISOString().slice(0,10); }
function dayIdx() { return Math.max(0, Math.min(Math.floor((now - START) / 86400000), DAYS.length - 1)); }
function daysLeft(d) { return Math.max(0, Math.ceil((d - now) / 86400000)); }

function badge(t) {
  const m = {study:'bs Study',mock:'bm Mock',rest:'br Rest',revision:'bv Revision',exam:'be Exam'};

  return `<span class="badge ${cls[0]}">${cls[1]}</span>`;
}

// ── NAV ───────────────────────────────────────────────────────────
function switchPage(pg) {
  document.querySelectorAll('.ntab, .mmtab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll(`.ntab[data-page="${pg}"], .mmtab[data-page="${pg}"]`).forEach(b => b.classList.add('on'));
  document.getElementById('page-' + pg).classList.add('on');
  const builders = {tracker: buildTracker, sleep: buildSleep, dashboard: buildDashboard};
  if (builders[pg]) builders[pg]();
}

// Desktop tabs
document.getElementById('nav-tabs').addEventListener('click', function(e) {
  const btn = e.target.closest('.ntab');
  if (!btn) return;
  switchPage(btn.dataset.page);
});

// Mobile menu
document.getElementById('mobile-menu').addEventListener('click', function(e) {
  const btn = e.target.closest('.mmtab');
  if (!btn) return;
  switchPage(btn.dataset.page);
  closeMobileMenu();
});

// Hamburger toggle
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobile-menu');
function closeMobileMenu() {
  hamburger.classList.remove('open');
  hamburger.setAttribute('aria-expanded', 'false');
  mobileMenu.classList.remove('open');
  document.body.style.overflow = '';
}
hamburger.addEventListener('click', function() {
  const isOpen = mobileMenu.classList.contains('open');
  if (isOpen) {
    closeMobileMenu();
  } else {
    hamburger.classList.add('open');
    hamburger.setAttribute('aria-expanded', 'true');
    mobileMenu.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
});
// Close on outside click / escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMobileMenu(); });

function getStudiedDays() { return Object.values(DB).filter(r => r.studied === 'Y').length; }

function getMockScores()  { return Object.values(DB).map(r => parseFloat(r.mock||0)).filter(n => n > 0); }
function getStreak() {
  let s = 0;
  for (let i = 0; i < 200; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    if (DB[k] && DB[k].studied === 'Y') s++;
    else if (i > 0) break;
  }
  return s;
}
function getSleepHrs() {
  return Object.entries(DB).filter(([k]) => k.startsWith('s_')).map(([,v]) => parseFloat(v.hrs||0)).filter(n=>n>0);
}

let planFilter = 'all', planSearch = '';
function buildPlan() {
  const idx = dayIdx();
  const filtered = DAYS.filter(d =>
    (planFilter === 'all' || d.phase === planFilter) &&
    (!planSearch || d.topic.toLowerCase().includes(planSearch) || d.subj.toLowerCase().includes(planSearch) || d.week.toLowerCase().includes(planSearch))
  );
  const rows = filtered.map(d => {
    const isToday = d.n - 1 === idx;
    const isDone  = DB[d.full] && DB[d.full].studied === 'Y';
    const pc = phClass(d.phase);
    return `
      <div class="day-row ${pc} ${isToday?'is-today':''} ${isDone?'is-done':''}" data-n="${d.n}">
        <div class="dnum">#${d.n}</div>
        <div><div class="ddate">${d.date}</div><div class="dday">${d.day}</div></div>
        <div class="dday">${d.week}</div>
        <div>${badge(d.type)}</div>
        <div><div class="dtopic">${d.topic}</div><div class="dsubj">${d.subj}</div></div>
        <button class="done-btn ${isDone?'done':''}" data-full="${d.full}" data-n="${d.n}">${isDone?'✓':'○'}</button>
      </div>
      <div class="detail-panel" id="dp-${d.n}">
        <div class="dp-block"><div class="dp-lbl">⏱ Time Allocation</div><div class="dp-val">${d.time}</div></div>
        <div class="dp-block"><div class="dp-lbl">📺 Resource</div><div class="dp-val">${d.link&&d.link!=='—'?`<a href="${d.link}" target="_blank" class="dp-link">${d.res} ↗</a>`:d.res}</div></div>
        <div class="dp-block"><div class="dp-lbl">🎯 Practice Target</div><div class="dp-val">${d.practice}</div></div>
        <div class="dp-block"><div class="dp-lbl">🌙 Evening Revision</div><div class="dp-val">${d.evening}</div></div>
      </div>`;
  }).join('');
  document.getElementById('plan-list').innerHTML = rows || '<div style="padding:40px;text-align:center;color:var(--muted)">No days match your search.</div>';
}

function initPlan() {
  document.getElementById('page-plan').innerHTML = `
    <div class="pg-title">140-Day Study Plan</div>
    <div class="pg-sub">Mar 23 → Aug 1, 2026 · Click any day to expand · ✓ to mark done</div>
    <div class="search-row">
      <input class="search-in" id="plan-search" placeholder="Search topic, subject, week..." type="text">
    </div>
    <div class="ftabs">
      <button class="ftab fall on" data-filter="all">All Days</button>
      <button class="ftab fg"      data-filter="Phase 1">🟢 Phase 1</button>
      <button class="ftab fb"      data-filter="Phase 2">🔵 Phase 2</button>
      <button class="ftab fa"      data-filter="Phase 3">🟠 Phase 3</button>
    </div>
    <div id="plan-list"></div>`;

  document.getElementById('plan-search').addEventListener('input', function() {
    planSearch = this.value.toLowerCase();
    buildPlan();
  });

  document.querySelector('.ftabs').addEventListener('click', function(e) {
    const btn = e.target.closest('.ftab');
    if (!btn) return;
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    planFilter = btn.dataset.filter;
    buildPlan();
  });

  document.getElementById('plan-list').addEventListener('click', function(e) {
    // Done button
    const doneBtn = e.target.closest('.done-btn');
    if (doneBtn) {
      e.stopPropagation();
      const full = doneBtn.dataset.full, n = doneBtn.dataset.n;
      if (!DB[full]) DB[full] = {};
      DB[full].studied = DB[full].studied === 'Y' ? 'N' : 'Y';
      save();
      buildPlan();
      buildDashboard();
      return;
    }
    // Row expand
    const row = e.target.closest('.day-row');
    if (row) {
      const n = row.dataset.n;
      const panel = document.getElementById('dp-' + n);
      if (panel) panel.classList.toggle('open');
    }
  });

  buildPlan();
}

// ── TRACKER ───────────────────────────────────────────────────────
function buildTracker() {
  const d = new Date('2026-03-23'), end = new Date('2026-08-01');
  const m2p = {3:'Phase 1',4:'Phase 1',5:'Phase 2',6:'Phase 2',7:'Phase 3',8:'Phase 3'};
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let rows = '';
  const cur = new Date(d);
  while (cur <= end) {
    const key = cur.toISOString().slice(0,10);
    const ph = m2p[cur.getMonth()+1]||'Phase 3';
    const pc = ph.includes('1')?'tr-p1':ph.includes('2')?'tr-p2':'tr-p3';
    const s = DB[key]||{};
    rows += `<tr class="${pc}">
      <td>${cur.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</td>
      <td style="color:var(--muted)">${days[cur.getDay()]}</td>
      <td style="font-size:11px;color:var(--muted)">${ph}</td>
      <td><input class="ti" data-key="${key}" data-f="studied" value="${s.studied||''}" style="width:28px;${s.studied==='Y'?'color:var(--g);font-weight:700':''}"></td>
      <td><input class="ti" data-key="${key}" data-f="hrs"     value="${s.hrs||''}"     style="width:38px"></td>
      <td><input class="ti" data-key="${key}" data-f="q"       value="${s.q||''}"       style="width:32px"></td>
      <td><input class="ti" data-key="${key}" data-f="r"       value="${s.r||''}"       style="width:32px"></td>
      <td><input class="ti" data-key="${key}" data-f="e"       value="${s.e||''}"       style="width:32px"></td>
      <td><input class="ti" data-key="${key}" data-f="ca"      value="${s.ca||''}"      style="width:32px"></td>
      <td><input class="ti" data-key="${key}" data-f="bk"      value="${s.bk||''}"      style="width:32px"></td>
      <td><input class="ti" data-key="${key}" data-f="mock"    value="${s.mock||''}"    style="width:38px"></td>
      <td><input class="ti" data-key="${key}" data-f="energy"  value="${s.energy||''}"  style="width:30px"></td>
      <td><input class="ti" data-key="${key}" data-f="notes"   value="${s.notes||''}"   style="width:120px;text-align:left"></td>
    </tr>`;
    cur.setDate(cur.getDate()+1);
  }

  const studied = getStudiedDays(), hrs = getTotalHrs().toFixed(0);
  const scores = getMockScores();
  const avgHrs = studied ? (getTotalHrs()/studied).toFixed(1) : 0;

  document.getElementById('page-tracker').innerHTML = `
    <div class="pg-title">Daily Study Tracker</div>
    <div class="pg-sub">Type Y in Studied? · Enter hours · Data auto-saves in browser</div>
    <div class="stats">
      <div class="sc g"><div class="sc-lbl">Days Studied</div><div class="sc-val">${studied}</div><div class="sc-hint">/ 132 days</div></div>
      <div class="sc b"><div class="sc-lbl">Total Hrs</div><div class="sc-val">${hrs}</div><div class="sc-hint">target: 280 hrs</div></div>
      <div class="sc a"><div class="sc-lbl">Avg Hrs/Day</div><div class="sc-val">${avgHrs}</div><div class="sc-hint">target: 2.5 hrs</div></div>
      <div class="sc r"><div class="sc-lbl">Best Mock</div><div class="sc-val">${scores.length?Math.max(...scores):0}</div><div class="sc-hint">avg: ${scores.length?(scores.reduce((a,b)=>a+b)/scores.length).toFixed(1):0} / target: 80</div></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Day</th><th>Phase</th>
          <th>Studied?<br><small style="font-weight:400;text-transform:none">Y/N</small></th>
          <th>Hrs</th><th>Quant</th><th>Reas</th><th>Eng</th><th>CA/GK</th><th>Bank</th><th>Mock</th><th>Energy<br>1-5</th><th>Notes</th>
        </tr></thead>
        <tbody id="tbdy">${rows}</tbody>
      </table>
    </div>`;

  document.getElementById('tbdy').addEventListener('change', function(e) {
    const inp = e.target.closest('input.ti');
    if (!inp) return;
    set(inp.dataset.key, inp.dataset.f, inp.value);
    if (inp.dataset.f === 'studied') {
      inp.style.color = inp.value === 'Y' ? 'var(--g)' : '';
      inp.style.fontWeight = inp.value === 'Y' ? '700' : '';
    }
  });
}

// ── SLEEP ─────────────────────────────────────────────────────────
function buildSleep() {
  const d = new Date('2026-03-23'), end = new Date('2026-08-01');
  const m2p = {3:'Phase 1',4:'Phase 1',5:'Phase 2',6:'Phase 2',7:'Phase 3',8:'Phase 3'};
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let rows = '';
  const cur = new Date(d);
  while (cur <= end) {
    const key = 's_' + cur.toISOString().slice(0,10);
    const ph = m2p[cur.getMonth()+1]||'Phase 3';
    const pc = ph.includes('1')?'tr-p1':ph.includes('2')?'tr-p2':'tr-p3';
    const s = DB[key]||{};
    const hrs = parseFloat(s.hrs||0);
    const st = hrs===0?'—':hrs>=8?'😴 Excellent':hrs>=7?'✅ Good':hrs>=6?'⚠️ Fair':'🔴 Poor';
    rows += `<tr class="${pc}">
      <td>${cur.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</td>
      <td style="color:var(--muted)">${days[cur.getDay()]}</td>
      <td><input class="ti si" data-key="${key}" data-f="bed"     value="${s.bed||''}"     style="width:70px"></td>
      <td><input class="ti si" data-key="${key}" data-f="hrs"     value="${s.hrs||''}"     style="width:38px;color:var(--p);font-weight:600"></td>
      <td><input class="ti si" data-key="${key}" data-f="wake"    value="${s.wake||''}"    style="width:70px"></td>
      <td><input class="ti si" data-key="${key}" data-f="quality" value="${s.quality||''}" style="width:34px"></td>
      <td style="font-size:12px">${st}</td>
      <td><input class="ti si" data-key="${key}" data-f="mood"    value="${s.mood||''}"    style="width:34px;color:var(--p)"></td>
      <td><input class="ti si" data-key="${key}" data-f="studied" value="${s.studied||''}" style="width:28px"></td>
      <td><input class="ti si" data-key="${key}" data-f="notes"   value="${s.notes||''}"   style="width:120px;text-align:left"></td>
    </tr>`;
    cur.setDate(cur.getDate()+1);
  }

  const sh = getSleepHrs();
  const avg = sh.length?(sh.reduce((a,b)=>a+b)/sh.length).toFixed(1):0;
  const gd = sh.filter(h=>h>=7).length, pd = sh.filter(h=>h<6).length;

  document.getElementById('page-sleep').innerHTML = `
    <div class="pg-title">Sleep Tracker</div>
    <div class="pg-sub">Target 7-8 hrs nightly · Good sleep = better retention · Auto-saves in browser</div>
    <div class="stats">
      <div class="sc p"><div class="sc-lbl">Avg Sleep Hrs</div><div class="sc-val">${avg}</div><div class="sc-hint">target: 7-8 hrs</div></div>
      <div class="sc g"><div class="sc-lbl">Days ≥ 7 hrs</div><div class="sc-val">${gd}</div><div class="sc-hint">keep it up!</div></div>
      <div class="sc r"><div class="sc-lbl">Days &lt; 6 hrs</div><div class="sc-val">${pd}</div><div class="sc-hint">avoid these</div></div>
      <div class="sc b"><div class="sc-lbl">Sleep Score</div><div class="sc-val">${sh.length?(gd/sh.length*10).toFixed(1):0}</div><div class="sc-hint">/ 10</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">😴 Excellent = 8+ hrs &nbsp;·&nbsp; ✅ Good = 7-8 hrs &nbsp;·&nbsp; ⚠️ Fair = 6-7 hrs &nbsp;·&nbsp; 🔴 Poor = &lt;6 hrs</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Day</th><th>Bed Time</th><th>Sleep Hrs</th><th>Wake Time</th>
          <th>Quality<br>1-5</th><th>Status</th><th>Mood AM<br>1-5</th><th>Studied?</th><th>Notes</th>
        </tr></thead>
        <tbody id="sbdy">${rows}</tbody>
      </table>
    </div>`;

  document.getElementById('sbdy').addEventListener('change', function(e) {
    const inp = e.target.closest('input.si');
    if (!inp) return;
    set(inp.dataset.key, inp.dataset.f, inp.value);
    if (inp.dataset.f === 'hrs') buildSleep();
  });
}
